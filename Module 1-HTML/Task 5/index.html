<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Registration</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-wrap">
    <section class="form-card">
      <h1>Event Registration</h1>
      <p>Register for an upcoming community event.</p>
      <form id="registrationForm">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your full name"
          required
          autofocus
        />

        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
        />

        <label for="date">Event Date</label>
        <input
          type="date"
          id="date"
          name="date"
          required
        />

        <label for="eventType">Event Type</label>
        <select id="eventType" name="eventType" required>
          <option value="" disabled selected>Select an event</option>
          <option value="workshop">Workshop</option>
          <option value="seminar">Seminar</option>
          <option value="fair">Community Fair</option>
          <option value="networking">Networking</option>
        </select>

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Tell us what interests you about this event"
        ></textarea>

        <button type="submit">Submit Registration</button>
      </form>

      <output id="confirmation" aria-live="polite"></output>
    </section>
  </main>
  <script>
    const form = document.getElementById('registrationForm');
    const confirmation = document.getElementById('confirmation');

    function getLiveSummary() {
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const date = form.date.value;
      const eventType = form.eventType.value;
      const message = form.message.value.trim();

      if (!name && !email && !date && !eventType && !message) {
        return 'Fill out the form to preview your registration details in real time.';
      }

      const parts = [];
      if (name) parts.push(`Name: ${name}`);
      if (email) parts.push(`Email: ${email}`);
      if (date) parts.push(`Date: ${date}`);
      if (eventType) parts.push(`Event: ${eventType}`);
      if (message) parts.push(`Note: ${message}`);

      return parts.join(' · ');
    }

    function updateOutput(message, type = '') {
      confirmation.textContent = message;
      confirmation.className = type;
    }

    form.addEventListener('input', function () {
      updateOutput(getLiveSummary());
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      if (!form.checkValidity()) {
        updateOutput('Please complete all required fields correctly.', 'error');
        return;
      }

      const name = form.name.value.trim();
      const email = form.email.value.trim();
      const date = form.date.value;
      const eventType = form.eventType.value;

      updateOutput(`Thank you, ${name}! Your registration for the ${eventType} on ${date} has been received. A confirmation email will be sent to ${email}.`, 'success');
      form.reset();
      form.name.focus();
    });

    updateOutput(getLiveSummary());
  </script>
</body>
</html>
