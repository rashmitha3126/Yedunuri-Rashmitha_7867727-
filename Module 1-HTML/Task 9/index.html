<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Nearby Events</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      max-width: 500px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.75rem;
    }
    p {
      line-height: 1.6;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 999px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      transition: background 0.2s ease;
      margin-top: 1rem;
    }
    button:hover {
      background: #1d4ed8;
    }
    .output {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 12px;
      background: #eef2ff;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Find Nearby Events</h1>
    <p>Click the button to get your current location and find the nearest event.</p>
    <button id="find-events">Find Nearby Events</button>
    <div id="location-output" class="output" aria-live="polite">
      Coordinates and status will appear here.
    </div>
  </main>

  <script>
    const button = document.getElementById('find-events');
    const output = document.getElementById('location-output');

    function displayMessage(message, isError = false) {
      output.textContent = message;
      output.classList.toggle('error', isError);
    }

    function handlePosition(position) {
      const { latitude, longitude, accuracy } = position.coords;
      displayMessage(
        `Your coordinates:\nLatitude: ${latitude.toFixed(6)}\nLongitude: ${longitude.toFixed(6)}\nAccuracy: ${accuracy} meters`
      );
    }

    function handleError(error) {
      let message = 'Unable to retrieve location.';
      switch (error.code) {
        case error.PERMISSION_DENIED:
          message = 'Location permission denied. Please allow access to find nearby events.';
          break;
        case error.POSITION_UNAVAILABLE:
          message = 'Location information is unavailable. Try again in a clearer area.';
          break;
        case error.TIMEOUT:
          message = 'Location request timed out. Please try again.';
          break;
      }
      displayMessage(message, true);
    }

    button.addEventListener('click', () => {
      if (!navigator.geolocation) {
        displayMessage('Geolocation is not supported by your browser.', true);
        return;
      }

      displayMessage('Locating your position...');

      navigator.geolocation.getCurrentPosition(handlePosition, handleError, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0,
      });
    });
  </script>
</body>
</html>
