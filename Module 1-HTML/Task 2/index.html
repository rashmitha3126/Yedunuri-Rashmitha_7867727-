<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Example</title>
</head>
<body>
  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#events">Events</a></li>
      <li><a href="#contact">Contact</a></li>
      <li><a href="help.html" target="_blank">Help</a></li>
    </ul>
  </nav>

  <main>
    <section id="home">
      <h1>Home</h1>
      <p>Welcome to the home section. Use the navigation above to jump to Events or Contact.</p>
    </section>

    <section id="events">
      <h2>Events</h2>
      <p>Discover upcoming events and schedules here.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Get in touch with us through the contact section.</p>
    </section>
  </main>
</body>
</html>
