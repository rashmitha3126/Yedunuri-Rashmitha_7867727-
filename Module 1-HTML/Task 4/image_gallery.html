<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        td {
            padding: 20px;
            text-align: center;
            vertical-align: top;
        }

        /* Image styling class */
        .gallery-image {
            border: 4px solid #2c3e50;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery-image:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(44, 62, 80, 0.3);
        }

        .image-caption {
            margin-top: 12px;
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .event-title {
            color: #e74c3c;
            font-size: 0.95em;
            margin-top: 8px;
            font-style: italic;
        }

        .gallery-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        img {
            max-width: 280px;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Community Events Gallery</h1>
        
        <table>
            <!-- Row 1 -->
            <tr>
                <!-- Event 1: Summer Festival -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/FFD700/000000?text=Summer+Festival" 
                            alt="Community members enjoying outdoor music and food at the Summer Festival 2025" 
                            title="Summer Festival - June 15, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Summer Festival
                            <span class="event-title">June 15, 2025</span>
                        </div>
                    </div>
                </td>

                <!-- Event 2: Charity Run -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/FF6B6B/FFFFFF?text=Charity+Run" 
                            alt="Runners participating in the annual charity marathon for community health initiatives" 
                            title="Charity Run - March 22, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Charity Run
                            <span class="event-title">March 22, 2025</span>
                        </div>
                    </div>
                </td>

                <!-- Event 3: Art Exhibition -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/9B59B6/FFFFFF?text=Art+Exhibition" 
                            alt="Local artists displaying their paintings and sculptures at the community art exhibition" 
                            title="Art Exhibition - April 10, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Art Exhibition
                            <span class="event-title">April 10, 2025</span>
                        </div>
                    </div>
                </td>
            </tr>

            <!-- Row 2 -->
            <tr>
                <!-- Event 4: Food Festival -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/3498DB/FFFFFF?text=Food+Festival" 
                            alt="Diverse cuisine stalls and food vendors celebrating international cuisines from around the world" 
                            title="Food Festival - May 5, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Food Festival
                            <span class="event-title">May 5, 2025</span>
                        </div>
                    </div>
                </td>

                <!-- Event 5: Youth Sports Day -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/1ABC9C/FFFFFF?text=Sports+Day" 
                            alt="Young athletes competing in various sports competitions at the annual youth sports day" 
                            title="Youth Sports Day - February 14, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Youth Sports Day
                            <span class="event-title">February 14, 2025</span>
                        </div>
                    </div>
                </td>

                <!-- Event 6: Environmental Cleanup -->
                <td>
                    <div class="gallery-cell">
                        <img 
                            src="https://via.placeholder.com/280x200/27AE60/FFFFFF?text=Cleanup+Day" 
                            alt="Volunteers cleaning parks and streets to maintain a clean and green community environment" 
                            title="Environmental Cleanup - January 30, 2025"
                            class="gallery-image"
                        >
                        <div class="image-caption">
                            Environmental Cleanup
                            <span class="event-title">January 30, 2025</span>
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
